apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: taskapp
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/chantel50/taskapp-frontend:1.0.0
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: taskapp-config
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "50m"