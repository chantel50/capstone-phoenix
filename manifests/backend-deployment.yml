apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: taskapp
  labels:
    app: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: backend
      containers:
      - name: backend
        image: ghcr.io/ts-a-devops/taskapp-backend:5d6b8fc
        command: ["gunicorn"]
        args: ["--workers", "3", "--bind", "0.0.0.0:5000", "--access-logfile", "-", "run:app"]
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: taskapp-config
        - secretRef:
            name: taskapp-secret
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        startupProbe:
          httpGet:
            path: /api/health
            port: 5000
          failureThreshold: 30
          periodSeconds: 2
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
