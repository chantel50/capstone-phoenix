---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Install required packages
  apt:
    name:
      - ufw
      - fail2ban
      - unattended-upgrades
    state: present
  become: yes

- name: Allow SSH through UFW
  ufw:
    rule: allow
    port: 22
    proto: tcp
  become: yes

- name: Allow HTTP through UFW
  ufw:
    rule: allow
    port: 80
    proto: tcp
  become: yes

- name: Allow HTTPS through UFW
  ufw:
    rule: allow
    port: 443
    proto: tcp
  become: yes

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny
  become: yes

- name: Enable fail2ban
  service:
    name: fail2ban
    state: started
    enabled: yes
  become: yes
